name: 🐛 Bug Report
description: Report a bug or unexpected behavior in aegis http
title: "[Bug]: "
labels: [ "bug", "needs triage" ]
assignees: []
body:
- type: markdown
  attributes:
    value: |
      Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

- type: textarea
  id: bug-description
  attributes:
    label: Bug Description
    description: A clear and concise description of what the bug is.
    placeholder: Describe the bug...
  validations:
    required: true

- type: textarea
  id: expected-behavior
  attributes:
    label: Expected Behavior
    description: A clear and concise description of what you expected to happen.
    placeholder: What should have happened?
  validations:
    required: true

- type: textarea
  id: actual-behavior
  attributes:
    label: Actual Behavior
    description: A clear and concise description of what actually happened.
    placeholder: What actually happened?
  validations:
    required: true

- type: textarea
  id: steps-to-reproduce
  attributes:
    label: Steps to Reproduce
    description: Steps to reproduce the behavior
    placeholder: |
      1. Go to '...'
      2. Use component '...'
      3. Set property '...'
      4. See error
  validations:
    required: true

- type: dropdown
  id: component
  attributes:
    label: Which component is affected?
    description: Select the component that has the bug
    options:
    - Native Host Rust
    - Google Chrome Extension
    - Firefox Extension
    - Go Fiber Extension
    - Caddy Server Extension
    - Other/Multiple
  validations:
    required: true

- type: input
  id: rust-version
  attributes:
    label: Rust Version
    description: What version of Rust are you using?
    placeholder: "rustc --version"
  validations:
    required: true

- type: dropdown
  id: platform
  attributes:
    label: Platform
    description: Which platform(s) does this issue occur on?
    multiple: true
    options:
    - Android
    - iOS
    - Web
    - Windows
    - macOS
    - Linux
  validations:
    required: true


- type: textarea
  id: additional-context
  attributes:
    label: Additional Context
    description: Add any other context about the problem here, including screenshots, error logs, etc.
    placeholder: Any additional information that might help...

- type: checkboxes
  id: checklist
  attributes:
    label: Checklist
    description: Please confirm the following
    options:
    - label: I have searched existing issues and this is not a duplicate
      required: true
    - label: I have provided a minimal code sample that reproduces the issue
      required: true
    - label: I am using the latest version of aegis-http
      required: false